name: Apartment Hunter Scan

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore database
        uses: actions/cache@v4
        with:
          path: apartments.db
          key: apartments-db-${{ github.run_id }}
          restore-keys: |
            apartments-db-

      - name: Run apartment scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Save database
        if: always()
        uses: actions/cache/save@v4
        with:
          path: apartments.db
          key: apartments-db-${{ github.run_id }}
